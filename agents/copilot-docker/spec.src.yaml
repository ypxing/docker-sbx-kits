schemaVersion: "1"
kind: agent
name: copilot-docker
displayName: Copilot Agent (GitHub)
description: GitHub Copilot agent with GITHUB_TOKEN auth.

agent:
  image: "docker/sandbox-templates:copilot-docker"
  entrypoint:
    run: [copilot, --yolo]

environment:
  variables:
    IS_SANDBOX: "1"
    SBX_NO_TELEMETRY: "1"
  proxyManaged:
    - GH_TOKEN
    - GITHUB_TOKEN

network:
  allowedDomains:
    - "*.github.com"
