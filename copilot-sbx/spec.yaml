schemaVersion: "1"
kind: agent
name: copilot-sbx
displayName: Copilot Agent (GitHub + NPM)
description: GitHub Copilot agent with GITHUB_TOKEN auth and proxy-managed NPM auth.

agent:
  image: "docker/sandbox-templates:copilot-docker"
  entrypoint:
    run: [copilot, "--yolo"]

environment:
  variables:
    IS_SANDBOX: "1"
    SBX_NO_TELEMETRY: "1"
  proxyManaged:
    - GITHUB_TOKEN
    - NPM_TOKEN

network:
  allowedDomains:
    - "*.github.com"
    - "registry.npmjs.org"
  serviceDomains:
    registry.npmjs.org: npm-registry
  serviceAuth:
    npm-registry:
      headerName: Authorization
      valueFormat: "Bearer %s"

credentials:
  sources:
    npm-registry:
      env:
        - NPM_TOKEN
