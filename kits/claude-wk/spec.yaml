schemaVersion: "1"
kind: mixin
name: claude-wk
displayName: Claude-Workspace
description: Workspace mixin for Claude. Provides a heads-up display for Claude agents, showing model info, usage stats, and more.

network:
  allowedDomains:
    - "raw.githubusercontent.com"

commands:
  install:
    - command: |
        curl -fsSL https://raw.githubusercontent.com/ypxing/coding-crew/16e85098a8a3baae01761fb7dede62edcc079e31/bootstrap.sh | bash -s -- claude
      user: "1000"
      description: "Install coding-crew"
