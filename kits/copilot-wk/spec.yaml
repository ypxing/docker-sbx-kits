schemaVersion: "1"
kind: mixin
name: copilot-wk
displayName: Copilot-Workspace
description: Workspace mixin for Copilot. Provides a heads-up display for Copilot agents, showing model info, usage stats, and more.

network:
  allowedDomains:
    - "raw.githubusercontent.com"

commands:
  install:
    - command: |
        curl -fsSL https://raw.githubusercontent.com/ypxing/coding-crew/0c13281ef32c8e3f2cafc3b5203ccdb387ca5584/bootstrap.sh | bash -s -- copilot
      user: "1000"
      description: "Install coding-crew"
